name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string
      pypi_token:
        description: 'PyPI API token (pypi-xxx). Leave empty to use OIDC trusted publishing.'
        required: false
        type: string

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Publish to PyPI (via token or OIDC)
        env:
          PYPI_TOKEN_SECRET: ${{ secrets.PYPI_TOKEN }}
        if: env.PYPI_TOKEN_SECRET != ''
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          # Uses PYPI_TOKEN secret; OIDC disabled until PyPI trusted publisher is configured
          password: ${{ secrets.PYPI_TOKEN }}
          trusted-publishing: false
          attestations: false
